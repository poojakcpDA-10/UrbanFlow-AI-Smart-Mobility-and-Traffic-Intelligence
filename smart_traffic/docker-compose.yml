version: '3.8'

services:
  smarttraffic:
    build: .
    container_name: smarttraffic_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-smart-traffic-secret-2024}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-traffic-secret-2024}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///smart_traffic.db}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - TWILIO_SID=${TWILIO_SID:-}
      - TWILIO_TOKEN=${TWILIO_TOKEN:-}
    volumes:
      - ./uploads:/app/uploads
      - ./clips:/app/clips
      - ./flask_sessions:/app/flask_sessions
      - smarttraffic_db:/app/instance
    networks:
      - smarttraffic_net

  nginx:
    image: nginx:alpine
    container_name: smarttraffic_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - smarttraffic
    networks:
      - smarttraffic_net

volumes:
  smarttraffic_db:

networks:
  smarttraffic_net:
    driver: bridge
