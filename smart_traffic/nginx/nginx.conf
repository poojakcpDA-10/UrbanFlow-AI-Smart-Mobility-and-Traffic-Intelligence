worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    upstream smarttraffic_backend {
        server smarttraffic:5000;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL (place your certs in nginx/certs/)
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

        # Serve frontend
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to Flask
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;

            proxy_pass http://smarttraffic_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Auth endpoints — stricter rate limit
        location /api/auth/ {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass http://smarttraffic_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SocketIO
        location /socket.io/ {
            proxy_pass http://smarttraffic_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Camera streams — no rate limit (long-lived)
        location /api/camera/live-stream/ {
            proxy_pass http://smarttraffic_backend;
            proxy_buffering off;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }
    }
}
